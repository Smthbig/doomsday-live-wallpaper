name: Signed Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      CI: true
      APP_NAME: doomsday

    steps:

      # -------------------------------
      # CHECKOUT
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grant execute permission
        run: chmod +x gradlew

      # -------------------------------
      # JAVA + ANDROID
      # -------------------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # -------------------------------
      # KEYSTORE SETUP
      # -------------------------------
      - name: Validate secret
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_BASE64 is empty"
            exit 1
          fi

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

          if [ ! -s keystore.jks ]; then
            echo "ERROR: keystore invalid"
            exit 1
          fi

      - name: Verify keystore
        run: |
          keytool -list -keystore keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" > /dev/null

      - name: Export signing env
        run: |
          echo "KEYSTORE_FILE=keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # -------------------------------
      # VERSION EXTRACTION
      # -------------------------------
      - name: Extract version
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName)
          VERSION_CODE=$(./gradlew -q printVersionCode)

          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Version extraction failed"
            exit 1
          fi

          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

      # -------------------------------
      # VALIDATION
      # -------------------------------
      - name: Validate version format
        run: |
          VERSION=${{ steps.version.outputs.name }}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid version format"
            exit 1
          fi

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.name }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if release exists
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Release already exists"
          exit 0

      # -------------------------------
      # BUILD
      # -------------------------------
      - name: Build APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      # -------------------------------
      # FIND APK (ROBUST)
      # -------------------------------
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      # -------------------------------
      # RENAME (SAFE NAMING)
      # -------------------------------
      - name: Rename APK
        id: rename
        run: |
          OUTPUT="${{ env.APP_NAME }}-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}.apk"
          mv "${{ steps.apk.outputs.path }}" "$OUTPUT"

          echo "file=$OUTPUT" >> $GITHUB_OUTPUT

      # -------------------------------
      # VERIFY
      # -------------------------------
      - name: Verify APK
        run: |
          if [ ! -f "${{ steps.rename.outputs.file }}" ]; then
            echo "APK missing"
            exit 1
          fi

      # -------------------------------
      # CHANGELOG
      # -------------------------------
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "CHANGELOG<<EOF"
            echo "## ${{ env.APP_NAME }} v${{ steps.version.outputs.name }}"
            echo ""

            if [ -z "$LAST_TAG" ]; then
              git log --pretty=format:"- %s"
            else
              git log ${LAST_TAG}..HEAD --pretty=format:"- %s"
            fi

            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # -------------------------------
      # RELEASE
      # -------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: ${{ env.APP_NAME }} v${{ steps.version.outputs.name }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: ${{ steps.rename.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}